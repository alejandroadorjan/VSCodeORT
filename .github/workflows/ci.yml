name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libx11-xcb-dev \
            libxkbfile-dev \
            libnotify-bin \
            libkrb5-dev \
            libgbm1 \
            libgtk-3-0 \
            xvfb

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: npm ci
        working-directory: build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build and typecheck
        run: |
          set -e
          npm run gulp compile-build-without-mangling transpile-client-esbuild transpile-extensions
          npm run hygiene
          npm run eslint
          npm run valid-layers-check
          npm run define-class-fields-check
          npm run vscode-dts-compile-check
          npm run tsec-compile-check
          npm run test-build-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests node.js
        run: npm run test-node

      - name: Run unit tests browser
        run: npm run test-browser-no-install -- --browser chromium --tfs "Browser Unit Tests"
        env:
          DEBUG: "*browser*"

      - name: Run unit tests Electron
        run: |
          npm run electron
          sudo chown root .build/electron/chrome-sandbox
          sudo chmod 4755 .build/electron/chrome-sandbox
          VSCODE_SKIP_PRELAUNCH=1 xvfb-run ./scripts/test.sh --build --tfs "Unit Tests"

      - name: Build integration prerequisites
        run: |
          set -e
          cd test/integration/browser
          npm run compile

      - name: Run integration tests Electron
        run: ./scripts/test-integration.sh --suite api-folder

      - name: Run integration tests Browser Chromium
        run: ./scripts/test-web-integration.sh --browser chromium

      - name: Run integration tests Remote
        run: ./scripts/test-remote-integration.sh

      - name: Run smoke tests Electron
        run: npm run smoketest -- --tracing

      - name: Run smoke tests Browser Chromium
        run: npm run smoketest -- --web --browser chromium --headless --tracing

